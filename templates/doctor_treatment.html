{% extends "base.html" %}
{% block content %} 
<h2>Treatment Details</h2> 

<p>
  Appointment on {{ appointment.date }} at {{ appointment.time.strftime('%H:%M') }}<br>
  Patient: {{ appointment.patient.full_name }} 
</p>

<form method="post">
  <div class="mb-3"> 
    <label class="form-label">Diagnosis</label>
    <textarea
      name="diagnosis"
      class="form-control"
      rows="3" 
    >{{ treatment.diagnosis if treatment else '' }}</textarea>
  </div>

  <div class="mb-3">
    <label class="form-label">Prescription</label> 
    <textarea
      name="prescription"
      class="form-control"
      rows="3" 
    >{{ treatment.prescription if treatment else '' }}</textarea>
  </div> 

  <div class="mb-3">
    <label class="form-label">Notes</label>
    <textarea
      name="notes"
      class="form-control" 
      rows="3"
    >{{ treatment.notes if treatment else '' }}</textarea>
  </div> 

  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{{ url_for('doctor_dashboard') }}" class="btn btn-secondary">Cancel</a> 
</form> 
{% endblock %}
