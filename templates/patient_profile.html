{% extends "base.html" %} 
{% block content %}
<h2>My Profile</h2>

<form method="post"> 
  <div class="row">
    <div class="col-md-6 mb-3"> 
      <label class="form-label">Full Name</label>
      <input 
        type="text"
        name="full_name"
        class="form-control" 
        required
        value="{{ patient.full_name }}"
      > 
    </div>
    <div class="col-md-6 mb-3">
      <label class="form-label">Email</label>  
      <input
        type="email"
        name="email"
        class="form-control" 
        required
        value="{{ user.email }}"  
      >
    </div>
  </div> 

  <div class="row">
    <div class="col-md-3 mb-3">
      <label class="form-label">Age</label> 
      <input
        type="number" 
        name="age"
        class="form-control"
        value="{{ patient.age if patient.age else '' }}"
      >
    </div>
    <div class="col-md-3 mb-3"> 
      <label class="form-label">Gender</label>
      <input
        type="text"
        name="gender"  
        class="form-control"
        value="{{ patient.gender }}"
      >
    </div>
    <div class="col-md-3 mb-3">
      <label class="form-label">Phone</label>
      <input
        type="text" 
        name="phone"
        class="form-control"
        value="{{ patient.phone }}" 
      >
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Address</label>
    <textarea name="address" class="form-control" rows="3">{{ patient.address }}</textarea>
  </div>
 
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{{ url_for('patient_dashboard') }}" class="btn btn-secondary">Cancel</a> 
</form>
{% endblock %}
